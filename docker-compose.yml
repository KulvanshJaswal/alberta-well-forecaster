version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Caesar123
      POSTGRES_DB: alberta_well_forecaster
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:Caesar123@db:5432/alberta_well_forecaster
    depends_on:
      - db

volumes:
  postgres_data: